<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>下载点击统计后台</title>
  <style>
    :root{
      --bg1:#0b1220;
      --bg2:#0f1a33;
      --card:#ffffff;
      --muted:#6b7280;
      --text:#0f172a;
      --border:rgba(15,23,42,.10);
      --shadow:0 10px 30px rgba(2,6,23,.08);
      --primary:#2563eb;
      --primary2:#60a5fa;
      --win:#22c55e;
      --android:#f59e0b;
      --danger:#ef4444;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Microsoft YaHei", Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(96,165,250,.25), transparent 60%),
                  radial-gradient(900px 450px at 90% 20%, rgba(34,197,94,.18), transparent 55%),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
      color:#e5e7eb;
      min-height:100vh;
    }

    .wrap{max-width:1040px;margin:0 auto;padding:26px 18px 42px}
    .hidden{display:none!important}

    .top{
      display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
      margin-bottom:16px;
    }
    .brand{display:flex;align-items:center;gap:12px}
    .logo{
      width:42px;height:42px;border-radius:12px;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      box-shadow: 0 12px 24px rgba(37,99,235,.28);
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-weight:800;
    }
    .brand h1{margin:0;font-size:18px;letter-spacing:.2px}
    .brand p{margin:2px 0 0;color:rgba(229,231,235,.8);font-size:12px}

    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width:840px){.grid{grid-template-columns:1fr}}

    .card{
      background: rgba(255,255,255,.96);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .statRow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .statTitle{font-size:13px;color:var(--muted);margin-bottom:8px}
    .statValue{font-size:30px;font-weight:900;letter-spacing:-.5px}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      border:1px solid var(--border);
      background:#f8fafc;
      padding:7px 10px;border-radius:999px;
      font-size:12px;color:#334155;
      white-space:nowrap;
    }
    .dot{width:8px;height:8px;border-radius:999px;background:var(--primary)}

    .barWrap{margin-top:12px}
    .barLabel{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px}
    .bar{
      height:10px;border-radius:999px;background:#eef2ff;overflow:hidden;
    }
    .bar > i{
      display:block;height:100%;width:0%;
      background: linear-gradient(90deg, var(--primary), var(--primary2));
      border-radius:999px;
      transition: width .35s ease;
    }
    .bar.win > i{background: linear-gradient(90deg, var(--win), #86efac)}
    .bar.android > i{background: linear-gradient(90deg, var(--android), #fcd34d)}

    .meta{
      margin-top:10px;color:var(--muted);font-size:12px;
      display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
    }
    .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .filters{
      display:flex;gap:10px;align-items:center;flex-wrap:wrap;
      margin-top:12px;
    }
    .filterGroup{
      display:flex;gap:8px;align-items:center;flex-wrap:wrap;
    }
    .filterLabel{
      font-size:12px;color:#475569;font-weight:700;
    }
    .chip{
      border:1px solid var(--border);
      background:#fff;
      color:#334155;
      padding:8px 12px;border-radius:999px;cursor:pointer;
      font-size:12px;font-weight:700;
      transition: all .2s ease;
    }
    .chip:hover{background:#f8fafc}
    .chip.active{
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;border-color:transparent;
      box-shadow:0 10px 20px rgba(37,99,235,.18);
    }
    .btn{
      border:1px solid rgba(37,99,235,.25);
      background: rgba(37,99,235,.08);
      color:#1d4ed8;
      padding:9px 12px;border-radius:12px;cursor:pointer;
      font-weight:700;
    }
    .btn.secondary{
      background: #ffffff;border:1px solid var(--border);color:#334155;
      font-weight:600;
    }
    .btn:disabled{opacity:.6;cursor:not-allowed}

    .tableCard{margin-top:12px}
    .sectionTitle{font-weight:900;font-size:14px;margin-bottom:10px}

    .tableWrap{overflow:auto;border-radius:14px;border:1px solid var(--border)}
    table{width:100%;border-collapse:separate;border-spacing:0;min-width:700px;background:#fff}
    thead th{
      position:sticky;top:0;background:#f8fafc;
      border-bottom:1px solid var(--border);
      color:#475569;font-size:12px;text-align:left;padding:12px 14px;
      white-space:nowrap;
    }
    tbody td{
      border-bottom:1px solid rgba(15,23,42,.06);
      padding:11px 14px;
      font-size:13px;
      color:#0f172a;
    }
    tbody tr:hover td{background:#f7faff}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace}

    .empty{
      padding:20px;color:#64748b;text-align:center;font-size:13px;
    }

    /* Login overlay */
    .overlay{
      position:fixed;inset:0;
      background: rgba(2,6,23,.58);
      display:flex;align-items:center;justify-content:center;
      padding:18px;
    }
    .loginBox{
      width:100%;max-width:420px;
      background:#0b1220;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      box-shadow: 0 30px 90px rgba(0,0,0,.45);
      padding:18px;
    }
    .loginTitle{color:#fff;font-weight:900;font-size:16px;margin:6px 0 4px}
    .loginSub{color:rgba(229,231,235,.8);font-size:12px;line-height:1.6;margin-bottom:14px}
    .field{display:flex;gap:10px;align-items:center;margin-top:10px}
    input{
      width:100%;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      padding:11px 12px;
      color:#e5e7eb;
      outline:none;
      font-size:14px;
    }
    input::placeholder{color:rgba(229,231,235,.55)}
    .err{
      margin-top:10px;color: #fecaca; font-size:12px; display:none;
      background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.28);
      padding:10px 12px;border-radius:12px;
    }
    .footerNote{margin-top:14px;color:rgba(229,231,235,.65);font-size:12px;line-height:1.6}
  </style>
</head>
<body>
  <div class="wrap hidden" id="app">
    <div class="top">
      <div class="brand">
        <div class="logo">DL</div>
        <div>
          <h1>下载点击统计后台</h1>
          <p>按按钮统计：电脑版（win）/ 安卓- iOS（android）</p>
        </div>
      </div>
      <div class="actions">
        <button class="btn secondary" id="btn-refresh" type="button">刷新</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="statRow">
          <div>
            <div class="statTitle">电脑版总点击次数</div>
            <div class="statValue" id="total-win">0</div>
          </div>
          <div class="pill"><span class="dot" style="background:var(--win)"></span> t=win</div>
        </div>
        <div class="barWrap">
          <div class="barLabel"><span>占比</span><span id="ratio-win">0%</span></div>
          <div class="bar win"><i id="bar-win"></i></div>
        </div>
      </div>

      <div class="card">
        <div class="statRow">
          <div>
            <div class="statTitle">安卓/ios总点击次数</div>
            <div class="statValue" id="total-android">0</div>
          </div>
          <div class="pill"><span class="dot" style="background:var(--android)"></span> t=android</div>
        </div>
        <div class="barWrap">
          <div class="barLabel"><span>占比</span><span id="ratio-android">0%</span></div>
          <div class="bar android"><i id="bar-android"></i></div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:12px;">
      <div class="filters">
        <div class="filterGroup" id="periodFilters">
          <span class="filterLabel">时间筛选</span>
          <button class="chip active" type="button" data-period="today">今天</button>
          <button class="chip" type="button" data-period="yesterday">昨天</button>
          <button class="chip" type="button" data-period="week">本周</button>
          <button class="chip" type="button" data-period="month">本月</button>
          <button class="chip" type="button" data-period="all">全部</button>
        </div>
        <div class="filterGroup" id="platformFilters">
          <span class="filterLabel">类型筛选</span>
          <button class="chip active" type="button" data-platform="all">全部</button>
          <button class="chip" type="button" data-platform="win">电脑版</button>
          <button class="chip" type="button" data-platform="android">安卓/iOS</button>
        </div>
      </div>
      <div class="meta">
        <div>数据生成时间：<b id="generated-at">-</b></div>
        <div></div>
      </div>
    </div>

    <div class="card tableCard">
      <div class="sectionTitle">最近点击明细</div>
      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th style="width: 190px;">时间</th>
              <th style="width: 120px;">按钮</th>
              <th style="width: 110px;">次数</th>
              <th style="width: 220px;">IP</th>
            </tr>
          </thead>
          <tbody id="recent-tbody">
            <tr><td colspan="4"><div class="empty">暂无数据</div></td></tr>
          </tbody>
        </table>
      </div>
      <div style="margin-top:10px;color:#64748b;font-size:12px;">显示最近 200 条（后端最多 200）</div>
    </div>
  </div>

  <div class="overlay" id="loginOverlay">
    <div class="loginBox">
      <div class="loginTitle">请输入后台密码</div>
      <form id="loginForm">
        <div class="field">
          <input id="pwInput" type="password" placeholder="Password" autocomplete="current-password" />
        </div>
        <div style="margin-top:12px;display:flex;gap:10px;">
          <button class="btn" style="flex:1;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border:none;padding:11px 12px;border-radius:12px;font-weight:900;" type="submit">登录</button>
          <button class="btn secondary" style="padding:11px 12px;border-radius:12px;font-weight:700;" type="button" id="btn-cancel">取消</button>
        </div>
        <div class="err" id="loginErr"></div>
      </form>
      <div class="footerNote">
        提示：如果你忘记密码，请联系管理员。
      </div>
    </div>
  </div>

  <script>
    const app = document.getElementById('app');
    const loginOverlay = document.getElementById('loginOverlay');
    const loginForm = document.getElementById('loginForm');
    const pwInput = document.getElementById('pwInput');
    const loginErr = document.getElementById('loginErr');
    const btnCancel = document.getElementById('btn-cancel');
    const periodFilters = document.getElementById('periodFilters');
    const platformFilters = document.getElementById('platformFilters');
    const state = {
      authed: false,
      period: 'today',
      platform: 'all'
    };

    function setAppVisible(visible) {
      app.classList.toggle('hidden', !visible);
    }

    function showLogin(msg) {
      setAppVisible(false);
      if (msg) {
        loginErr.textContent = msg;
        loginErr.style.display = 'block';
      } else {
        loginErr.textContent = '';
        loginErr.style.display = 'none';
      }
      loginOverlay.style.display = 'flex';
      setTimeout(() => pwInput.focus(), 0);
    }

    function hideLogin() {
      loginOverlay.style.display = 'none';
      setAppVisible(true);
    }

    function formatButton(button) {
      if (button === 'win') return '电脑版';
      if (button === 'android') return '安卓/ios';
      return button || '-';
    }

    function setTbodyEmpty() {
      const tbody = document.getElementById('recent-tbody');
      tbody.innerHTML = '<tr><td colspan="4"><div class="empty">暂无数据</div></td></tr>';
    }

    function setRatioAndBars(winCount, androidCount) {
      const total = (winCount + androidCount) || 0;
      const ratioWin = total ? (winCount / total) : 0;
      const ratioAndroid = total ? (androidCount / total) : 0;

      document.getElementById('ratio-win').textContent = Math.round(ratioWin * 100) + '%';
      document.getElementById('ratio-android').textContent = Math.round(ratioAndroid * 100) + '%';

      document.getElementById('bar-win').style.width = Math.round(ratioWin * 100) + '%';
      document.getElementById('bar-android').style.width = Math.round(ratioAndroid * 100) + '%';
    }

    function updateActiveChips() {
      for (const el of periodFilters.querySelectorAll('[data-period]')) {
        el.classList.toggle('active', el.dataset.period === state.period);
      }
      for (const el of platformFilters.querySelectorAll('[data-platform]')) {
        el.classList.toggle('active', el.dataset.platform === state.platform);
      }
    }

    async function loadStats() {
      const params = new URLSearchParams({
        ts: String(Date.now()),
        period: state.period,
        platform: state.platform
      });
      const url = './stats.php?' + params.toString();
      const res = await fetch(url, { cache: 'no-store' });

      if (res.status === 401) {
        state.authed = false;
        showLogin('需要密码才能查看统计。');
        throw new Error('unauthorized');
      }

      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      state.authed = true;
      hideLogin();

      const win = data?.totals?.win ?? 0;
      const android = data?.totals?.android ?? 0;

      document.getElementById('total-win').textContent = win;
      document.getElementById('total-android').textContent = android;
      document.getElementById('generated-at').textContent = data?.generated_at ?? '-';
      setRatioAndBars(win, android);

      const tbody = document.getElementById('recent-tbody');
      const recent = Array.isArray(data?.recent) ? data.recent : [];
      if (recent.length === 0) {
        setTbodyEmpty();
        return;
      }

      tbody.innerHTML = '';
      const items = recent.slice().reverse(); // 最新在前
      for (const ev of items) {
        const tr = document.createElement('tr');

        const tdTime = document.createElement('td');
        tdTime.textContent = ev.time || '-';

        const tdBtn = document.createElement('td');
        tdBtn.textContent = formatButton(ev.button);

        const tdCount = document.createElement('td');
        tdCount.textContent = String(ev.count ?? 0);

        const tdIp = document.createElement('td');
        tdIp.textContent = ev.ip || '-';
        tdIp.className = 'mono';

        tr.appendChild(tdTime);
        tr.appendChild(tdBtn);
        tr.appendChild(tdCount);
        tr.appendChild(tdIp);
        tbody.appendChild(tr);
      }
    }

    document.getElementById('btn-refresh').addEventListener('click', async () => {
      try { await loadStats(); }
      catch (e) { console.error(e); }
    });

    periodFilters.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-period]');
      if (!btn) return;
      state.period = btn.dataset.period || 'today';
      updateActiveChips();
      if (state.authed) {
        try { await loadStats(); } catch (e2) { console.error(e2); }
      }
    });

    platformFilters.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-platform]');
      if (!btn) return;
      state.platform = btn.dataset.platform || 'all';
      updateActiveChips();
      if (state.authed) {
        try { await loadStats(); } catch (e2) { console.error(e2); }
      }
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginErr.style.display = 'none';

      const pw = (pwInput.value || '').trim();
      if (!pw) {
        showLogin('请输入密码。');
        return;
      }

      try {
        const res = await fetch('./auth.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
          body: 'pw=' + encodeURIComponent(pw),
          cache: 'no-store'
        });

        if (!res.ok) {
          const j = await res.json().catch(() => null);
          showLogin(j?.error ? String(j.error) : '密码错误或认证失败。');
          return;
        }

        await loadStats();
      } catch (err) {
        console.error(err);
        showLogin('登录失败，请稍后重试。');
      }
    });

    btnCancel.addEventListener('click', () => {
      // 不登录就保持在登录状态
      pwInput.value = '';
      showLogin('需要密码才能查看统计。');
    });

    // 首次进入先尝试加载；401 则弹窗登录
    updateActiveChips();
    showLogin();
    loadStats().catch(() => {});
    setInterval(() => {
      if (state.authed) {
        loadStats().catch(() => {});
      }
    }, 5000);
  </script>
</body>
</html>
